<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora Binaria UCN</title>

<style>
body {
    font-family: Arial;
    background: #0b1a2b;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CONTENEDOR GENERAL */
.container {
    display: flex;
    gap: 20px;
}

/* CALCULADORA */
.calc {
    background: #f2f2f2;
    padding: 15px;
    border-radius: 15px;
    width: 260px;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

/* LOGO */
.logo {
    width: 100%;
    margin-bottom: 10px;
}

/* DISPLAY */
.display {
    background: black;
    color: #00ffcc;
    font-size: 20px;
    padding: 10px;
    margin-bottom: 10px;
    text-align: right;
    border-radius: 8px;
}

/* BOTONES */
button {
    width: 55px;
    height: 45px;
    margin: 3px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

/* EFECTO CLICK */
button:active {
    transform: scale(0.9);
    box-shadow: inset 0 0 8px black;
}

/* COLORES */
.num { background: #4dd0e1; }
.op { background: #ffe082; }
.control { background: #ef5350; color: white; }
.igual { background: #66bb6a; width: 100%; }

/* PANEL DERECHO */
.panel {
    width: 250px;
    background: #ffffff;
    border-radius: 15px;
    padding: 10px;
    font-size: 14px;
    overflow-y: auto;
    height: 350px;
}

.panel h3 {
    text-align: center;
}

.log {
    margin-bottom: 10px;
    border-bottom: 1px solid #ccc;
    padding-bottom: 5px;
}
</style>
</head>

<body>

<div class="container">

    <!-- CALCULADORA -->
    <div class="calc">

        <!-- LOGO -->
        <img src="ciber-logo.png" class="logo">

        <div class="display" id="display">0</div>

        <button class="control" onclick="clearAll()">AC</button>
        <button class="control" onclick="deleteOne()">CE</button>
        <button class="op" onclick="setOp('+')">+</button>
        <button class="op" onclick="setOp('-')">-</button>

        <button class="op" onclick="setOp('*')">×</button>
        <button class="op" onclick="setOp('/')">÷</button>
        <button class="op" onclick="complemento2()">C2</button>

        <button class="igual" onclick="calcular()">=</button>

        <button class="num" onclick="add('1')">1</button>
        <button class="num" onclick="add('0')">0</button>
    </div>

    <!-- PANEL PROCEDIMIENTO -->
    <div class="panel">
        <h3>Procedimiento</h3>
        <div id="log"></div>
    </div>

</div>

<script>
let valor = "";
let operador = "";
let memoria = "";

function actualizarDisplay() {
    document.getElementById("display").innerText = valor || "0";
}

function agregarLog(texto) {
    let log = document.getElementById("log");
    log.innerHTML += `<div class="log">${texto}</div>`;
    log.scrollTop = log.scrollHeight;
}

function add(num) {
    valor += num;
    actualizarDisplay();
}

function clearAll() {
    valor = "";
    operador = "";
    memoria = "";
    document.getElementById("log").innerHTML = "";
    actualizarDisplay();
}

function deleteOne() {
    valor = valor.slice(0, -1);
    actualizarDisplay();
}

function setOp(op) {
    memoria = valor;
    operador = op;
    valor = "";
}

function binarioADecimal(bin) {
    return parseInt(bin, 2);
}

function decimalABinario(num) {
    return num.toString(2);
}

function calcular() {
    let a = binarioADecimal(memoria);
    let b = binarioADecimal(valor);
    let resultado;

    agregarLog(`Operación: ${memoria} ${operador} ${valor}`);
    agregarLog(`Decimal: ${a} ${operador} ${b}`);

    switch (operador) {
        case '+': resultado = a + b; break;
        case '-': resultado = a - b; break;
        case '*': resultado = a * b; break;
        case '/': resultado = Math.floor(a / b); break;
    }

    let bin = decimalABinario(resultado);

    agregarLog(`Resultado decimal: ${resultado}`);
    agregarLog(`Resultado binario: ${bin}`);

    valor = bin;
    operador = "";
    memoria = "";
    actualizarDisplay();
}

function complemento2() {
    let original = valor;
    let bits = valor.split('').map(b => b === '0' ? '1' : '0');

    let carry = 1;
    for (let i = bits.length - 1; i >= 0; i--) {
        if (bits[i] === '1' && carry === 1) {
            bits[i] = '0';
        } else if (carry === 1) {
            bits[i] = '1';
            carry = 0;
        }
    }

    let resultado = bits.join('');

    agregarLog(`C2 de ${original} → ${resultado}`);

    valor = resultado;
    actualizarDisplay();
}
</script>

</body>
</html>
</html>
