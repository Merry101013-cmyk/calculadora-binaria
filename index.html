<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora Binaria</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #0b1a2b;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .calc {
        background: #f2f2f2;
        padding: 20px;
        border-radius: 15px;
        width: 260px;
        box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    .display {
        background: black;
        color: #00ffcc;
        font-size: 20px;
        padding: 10px;
        margin-bottom: 10px;
        text-align: right;
        border-radius: 8px;
    }

    button {
        width: 55px;
        height: 45px;
        margin: 3px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }

    .num { background: #4dd0e1; }
    .op { background: #ffe082; }
    .control { background: #ef5350; color: white; }
    .igual { background: #66bb6a; width: 100%; }
</style>
</head>

<body>

<div class="calc">
    <div class="display" id="display">0</div>

    <!-- Controles -->
    <button class="control" onclick="clearAll()">AC</button>
    <button class="control" onclick="deleteOne()">CE</button>
    <button class="op" onclick="setOp('+')">+</button>
    <button class="op" onclick="setOp('-')">-</button>

    <button class="op" onclick="setOp('*')">×</button>
    <button class="op" onclick="setOp('/')">÷</button>
    <button class="op" onclick="complemento2()">C2</button>

    <button class="igual" onclick="calcular()">=</button>

    <!-- Binario -->
    <button class="num" onclick="add('1')">1</button>
    <button class="num" onclick="add('0')">0</button>
</div>

<script>
let valor = "";
let operador = "";
let memoria = "";

function actualizarDisplay() {
    document.getElementById("display").innerText = valor || "0";
}

function add(num) {
    valor += num;
    actualizarDisplay();
}

function clearAll() {
    valor = "";
    operador = "";
    memoria = "";
    actualizarDisplay();
}

function deleteOne() {
    valor = valor.slice(0, -1);
    actualizarDisplay();
}

function setOp(op) {
    if (valor === "") return;
    memoria = valor;
    operador = op;
    valor = "";
}

function binarioADecimal(bin) {
    return parseInt(bin, 2);
}

function decimalABinario(num) {
    return num.toString(2);
}

function calcular() {
    if (!memoria || !valor) return;

    let a = binarioADecimal(memoria);
    let b = binarioADecimal(valor);
    let resultado;

    switch (operador) {
        case '+': resultado = a + b; break;
        case '-': resultado = a - b; break;
        case '*': resultado = a * b; break;
        case '/': resultado = Math.floor(a / b); break;
    }

    valor = decimalABinario(resultado);
    operador = "";
    memoria = "";
    actualizarDisplay();
}

function complemento2() {
    if (!valor) return;

    let bits = valor.split('');
    
    // invertir bits
    bits = bits.map(b => b === '0' ? '1' : '0');

    // sumar 1
    let carry = 1;
    for (let i = bits.length - 1; i >= 0; i--) {
        if (bits[i] === '1' && carry === 1) {
            bits[i] = '0';
        } else if (carry === 1) {
            bits[i] = '1';
            carry = 0;
        }
    }

    valor = bits.join('');
    actualizarDisplay();
}
</script>

</body>
</html>
